<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ประวัติการศึกษา</title>

    <style>
        body{
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box{
            width: 80%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            text-align: center;
            color: #333;
        }

        h1{
            color: #1e3a8a;
            margin-bottom: 30px;
        }

        h3{
            color: #2563eb;
            margin-top: 25px;
        }

        p{
            font-size: 18px;
            line-height: 1.8;
        }

        a{
            display: inline-block;
            margin-top: 20px;
            color: #2563eb;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 20px;
            border: 2px solid #2563eb;
            border-radius: 10px;
            transition: 0.3s;
        }

        a:hover{
            background: #2563eb;
            color: white;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>🎓 ประวัติการศึกษา</h1>

    <h3>ระดับประถมศึกษา</h3>
    <p>...................................</p>

    <h3>ระดับมัธยมศึกษาตอนต้น</h3>
    <p>...................................</p>

    <h3>ระดับมัธยมศึกษาตอนปลาย</h3>
    <p>โรงเรียนพานทอง</p>

    <a href="index.html">⬅ กลับหน้าหลัก</a>
</div>

</body>
</html>
