<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการศึกษา</title>

    <style>
        body{
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;

            background: linear-gradient(135deg,
            #8be8d8,
            #b4e4ff);

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box{
            width: 80%;
            max-width: 700px;
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            text-align: center;
        }

        h1{
            color: #333;
            margin-bottom: 25px;
        }

        p{
            font-size: 20px;
            color: #555;
            margin: 15px 0;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>ประวัติการศึกษา</h1>

        <p>ระดับประถมศึกษา : โรงเรียนอนุบาลกมลวรรณ</p>

        <p>ระดับมัธยมศึกษาตอนต้น : โรงเรียนมาบยางพรวิทยาคม</p>

        <p>ระดับมัธยมศึกษาตอนปลาย : โรงเรียนพานทอง</p>
    </div>

</body>
</html>
