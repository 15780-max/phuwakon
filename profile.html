<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติส่วนตัว</title>

    <style>
        *{
            box-sizing: border-box;
        }

        body{
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .box{
            width: 100%;
            max-width: 800px;
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            text-align: center;
            color: #333;
        }

        .profile{
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            animation: float 3s ease-in-out infinite;
            transition: transform 0.3s;
        }

        .profile:hover{
            transform: scale(1.08);
        }

        @keyframes float{
            0%,100%{
                transform: translateY(0);
            }
            50%{
                transform: translateY(-10px);
            }
        }

        h1{
            color: #1e3a8a;
            margin-top: 20px;
        }

        p{
            font-size: 20px;
            line-height: 1.8;
        }

        a{
            display: inline-block;
            margin-top: 20px;
            color: #2563eb;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 20px;
            border: 2px solid #2563eb;
            border-radius: 10px;
            transition: 0.3s;
        }

        a:hover{
            background: #2563eb;
            color: white;
        }
    </style>
</head>

<body>

<div class="box">

    <img src="images/IMG-9139.jpg"
         class="profile"
         alt="รูปนายภูวกร ไชยเหมาะ">

    <h1>👤 ประวัติส่วนตัว</h1>

    <p><strong>ชื่อ-สกุล :</strong> นายภูวกร ไชยเหมาะ</p>
    <p><strong>ชื่อเล่น :</strong> ตอง</p>
    <p><strong>วันเกิด :</strong> 6 กันยายน 2551</p>
    <p><strong>อายุ :</strong> 18 ปี</p>
    <p><strong>กำลังศึกษา :</strong> ชั้นมัธยมศึกษาปีที่ 6/1</p>
    <p><strong>โรงเรียน :</strong> โรงเรียนพานทอง</p>
    <p><strong>งานอดิเรก :</strong> เล่นกีฬา ฟังเพลง ดูหนัง นอน</p>
    <p><strong>ความสามารถพิเศษ :</strong> เล่นกีฬาได้ทุกชนิด</p>

    <a href="index.html">⬅ กลับหน้าหลัก</a>

</div>

</body>
</html>
