        }

        img{
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
        }

        h1{
            margin-top: 20px;
        }

        p{
            font-size: 20px;
            line-height: 1.8;
        }

        a{
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
        }

        a:hover{
            color: yellow;
        }
    </style>
</head>
